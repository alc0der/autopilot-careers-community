version: "3"

# ── Shared Agent Packaging ───────────────────────────────────────────────
#
# This package remains the source of truth for the write-resume workflow.
# It emits:
#   - Claude Desktop plugin bundles and hot-reload deploys
#   - Codex plugin bundles plus a hidden development publish into the runtime project
#
# `task bundle` / `task deploy` remain the Claude Desktop path.

vars:
  PLUGIN_NAME: write-resume-plugin
  REPO_ROOT:
    sh: cd ../.. && pwd
  # CoWork RPM plugin directory (auto-detected from rpm/manifest.json)
  COWORK_SESSION_DIR: "{{.HOME}}/Library/Application Support/Claude/local-agent-mode-sessions"
  COWORK_RPM_PLUGIN_ID:
    sh: |
      python3 -c "
      import json, glob
      for m in glob.glob('{{.COWORK_SESSION_DIR}}/*/*/rpm/manifest.json'):
        data = json.load(open(m))
        for p in data.get('plugins', []):
          if p['name'] == '{{.PLUGIN_NAME}}':
            print(m.rsplit('/manifest.json',1)[0] + '/' + p['id'])
            exit()
      " 2>/dev/null || echo ""
  # Compute content checksum (strips version lines to avoid bump loops)
  CONTENT_CHECKSUM:
    sh: |
      python3 -c "
      import hashlib, pathlib, re
      h = hashlib.sha256()
      files = [pathlib.Path(r) for r in ['CLAUDE.md','setup.sh'] if pathlib.Path(r).is_file()]
      files.extend(pathlib.Path('.').glob('.claude-plugin/**/*'))
      files.extend(pathlib.Path('.').glob('.codex-plugin/**/*'))
      for g in ['commands/**/*','skills/**/*']:
        files.extend(pathlib.Path('.').glob(g))
      for f in sorted(set(files)):
        if not f.is_file() or f.name=='.DS_Store': continue
        c = f.read_bytes()
        if f.name in ('plugin.json','SKILL.md'):
          c = re.sub(rb'version[\":\s]+[\d.]+', b'', c)
        h.update(str(f).encode()); h.update(c)
      print(h.hexdigest()[:16])
      "

tasks:
  version:bump:
    desc: Auto-bump patch version if plugin content changed
    status:
      - test -f .plugin-checksum
      - test "{{.CONTENT_CHECKSUM}}" = "$(cat .plugin-checksum)"
    cmds:
      - |
        python3 -c "
        import json, re, pathlib

        pj = pathlib.Path('.claude-plugin/plugin.json')
        data = json.loads(pj.read_text())
        parts = list(map(int, data['version'].split('.')))
        old_ver = data['version']
        parts[2] += 1
        new_ver = '.'.join(map(str, parts))
        data['version'] = new_ver
        pj.write_text(json.dumps(data, indent=2) + '\n')

        codex_pj = pathlib.Path('.codex-plugin/plugin.json')
        codex_data = json.loads(codex_pj.read_text())
        codex_data['version'] = new_ver
        codex_pj.write_text(json.dumps(codex_data, indent=2) + '\n')

        package_json = pathlib.Path('package.json')
        package_data = json.loads(package_json.read_text())
        package_data['version'] = new_ver
        package_json.write_text(json.dumps(package_data, indent=2) + '\n')

        skill = pathlib.Path('skills/write-resume/SKILL.md')
        text = skill.read_text()
        text = re.sub(r'(version:\s*)[\d.]+', rf'\g<1>{new_ver}', text, count=1)
        skill.write_text(text)

        print(f'Bumped {old_ver} → {new_ver}')
        "
      - echo "{{.CONTENT_CHECKSUM}}" > .plugin-checksum

  bundle:
    desc: Create distributable plugin zip (upload via Claude Desktop UI for first install)
    deps: [version:bump]
    vars:
      VERSION:
        sh: python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])"
    cmds:
      - rm -f "{{.PLUGIN_NAME}}-{{.VERSION}}.zip"
      - zip -r "{{.PLUGIN_NAME}}-{{.VERSION}}.zip"
          .claude-plugin/
          CLAUDE.md
          commands/
          setup.sh
          skills/
          -x "*.DS_Store"
      - echo "Created {{.PLUGIN_NAME}}-{{.VERSION}}.zip"

  deploy:
    desc: Hot-reload plugin into CoWork (updates files only, no re-registration)
    deps: [bundle]
    preconditions:
      - sh: test -n "{{.COWORK_RPM_PLUGIN_ID}}"
        msg: |
          write-resume-plugin not found in any CoWork session.
          Upload the zip via Claude Desktop UI first, then use 'task deploy' for updates.
    vars:
      VERSION:
        sh: python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])"
    cmds:
      - rm -rf "{{.COWORK_RPM_PLUGIN_ID}}"/*
      - unzip -o "{{.PLUGIN_NAME}}-{{.VERSION}}.zip" -d "{{.COWORK_RPM_PLUGIN_ID}}"
      - echo "Deployed {{.VERSION}} → {{.COWORK_RPM_PLUGIN_ID}}"
